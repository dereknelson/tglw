<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background circle -->
  <circle cx="16" cy="16" r="15" fill="#1a8a2e"/>
  <!-- Robot head - left half mechanical, right half human -->
  <!-- Head shape -->
  <rect x="9" y="7" width="14" height="16" rx="3" fill="#222"/>
  <!-- Human half (left) -->
  <rect x="9" y="7" width="7" height="16" rx="3" fill="#f0c8a0"/>
  <!-- Human eye -->
  <circle cx="13" cy="14" r="1.5" fill="#333"/>
  <!-- Robot eye -->
  <circle cx="19" cy="14" r="1.8" fill="#4af"/>
  <circle cx="19" cy="14" r="0.8" fill="#fff"/>
  <!-- Robot antenna -->
  <line x1="20" y1="7" x2="20" y2="3" stroke="#4af" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="20" cy="2.5" r="1.2" fill="#4af"/>
  <!-- Robot panel lines -->
  <line x1="17" y1="18" x2="23" y2="18" stroke="#4af" stroke-width="0.5" opacity="0.6"/>
  <line x1="17" y1="20" x2="21" y2="20" stroke="#4af" stroke-width="0.5" opacity="0.6"/>
  <!-- Mouth -->
  <rect x="12" y="19" width="8" height="1.5" rx="0.75" fill="#333" opacity="0.5"/>
  <!-- Grass at bottom -->
  <path d="M4 28 L6 24 L8 28 L10 23 L12 28 L14 24 L16 28 L18 23 L20 28 L22 24 L24 28 L26 23 L28 28" fill="none" stroke="#1a8a2e" stroke-width="1.5"/>
</svg>
