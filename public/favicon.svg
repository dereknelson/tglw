<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Antenna -->
  <line x1="16" y1="4" x2="16" y2="1" stroke="#888" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="16" cy="0.5" r="1.5" fill="#1a8a2e"/>
  <!-- Head -->
  <rect x="6" y="4" width="20" height="20" rx="4" fill="#ccc" stroke="#999" stroke-width="1"/>
  <!-- Eyes -->
  <rect x="10" y="10" width="4" height="5" rx="1" fill="#1a8a2e"/>
  <rect x="18" y="10" width="4" height="5" rx="1" fill="#1a8a2e"/>
  <!-- Mouth -->
  <rect x="11" y="19" width="10" height="2" rx="1" fill="#888"/>
  <line x1="14" y1="19" x2="14" y2="21" stroke="#aaa" stroke-width="0.5"/>
  <line x1="16" y1="19" x2="16" y2="21" stroke="#aaa" stroke-width="0.5"/>
  <line x1="18" y1="19" x2="18" y2="21" stroke="#aaa" stroke-width="0.5"/>
  <!-- Ears -->
  <rect x="3" y="11" width="3" height="6" rx="1" fill="#999"/>
  <rect x="26" y="11" width="3" height="6" rx="1" fill="#999"/>
</svg>
